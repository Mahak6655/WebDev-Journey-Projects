
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Simon Game</title>

    <!-- External CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main heading -->
    <h1>Simon Game</h1>

    <!-- Instructions and level display -->
    <h2>Press any key to start</h2>
    <p class="instruction">
    Repeat the color sequence correctly to reach higher levels 🎮
    </p>
    <!-- Game buttons container -->
    <div class="btnContainer">

        <!-- First row -->
        <div class="lineOne">
            <div class="btn red" id="red">1</div>
            <div class="btn yellow" id="yellow">2</div>
        </div>

        <!-- Second row -->
        <div class="lineTwo">
            <div class="btn purple" id="purple">3</div>
            <div class="btn green" id="green">4</div>
        </div>

    </div>

    <!-- External JavaScript file -->
    <script src="script.js"></script>

</body>
</html>
